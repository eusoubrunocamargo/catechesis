spring:
  application:
    name: catechesis-backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/catechesis_dev}
    username: ${DATABASE_USER:catechesis_dev}
    password: ${DATABASE_PASSWORD:dev}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info

logging:
  level:
    com.catechesis: DEBUG

app:
  auth:
    mode: ${APP_AUTH_MODE:dev}